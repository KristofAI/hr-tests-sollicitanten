<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Selectieprocedure — United Consulting</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #434A55;
    --text: #424B55;
    --border: #E3E7EE;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  body {
    font-family: var(--font-stack);
    background: #F5F6F8;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    max-width: 520px;
    width: 100%;
    padding: 3rem 2.5rem;
    text-align: center;
  }
  .brand {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--charcoal);
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 20px;
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--charcoal);
    margin-bottom: 0.5rem;
  }
  h1 strong { font-weight: 700; }
  p {
    font-size: 13px;
    color: #777;
    line-height: 1.7;
    margin-top: 1.5rem;
  }
  .footer {
    margin-top: 2.5rem;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #bbb;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">United Consulting™</div>
    <h1>HR<br><strong>Selectieprocedure</strong></h1>
    <p>Welkom. Deze pagina bevat de HR-kennistoetsen voor onze selectieprocedure.<br><br>
    Gebruik de specifieke link die je van je recruiter hebt ontvangen om de juiste test te starten.</p>
    <div class="footer">www.unitedconsulting.be</div>
  </div>
</body>
</html>
